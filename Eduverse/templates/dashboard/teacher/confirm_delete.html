{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-danger mb-3">
            <div class="card-body p-4 text-center">
                <h3 class="text-danger mb-4">Confirm Delete</h3>
                <p>Are you sure you want to delete "{{ object }}"?</p>
                <form method="post">
                    {% csrf_token %}
                    <button class="btn btn-outline-secondary me-2" type="button" onclick="window.history.back()">Cancel</button>
                    <button class="btn btn-danger" type="submit">Yes, Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

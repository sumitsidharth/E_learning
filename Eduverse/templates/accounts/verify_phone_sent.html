{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-8 col-lg-6 text-center">
        <div class="bauhaus-card p-5 bg-white position-relative">
            <!-- Decorative Elements -->
            <div class="bauhaus-shape shape-circle bg-bauhaus-blue opacity-50" style="width: 100px; height: 100px; top: -30px; left: -30px; z-index: -1;"></div>
            <div class="bauhaus-shape bg-bauhaus-yellow" style="width: 50px; height: 50px; bottom: -20px; right: -20px; z-index: -1;"></div>
            
            <div class="mb-4 mt-2">
                <i class="bi bi-chat-left-text-fill text-bauhaus-blue" style="font-size: 5rem;"></i>
            </div>
            <h2 class="text-bauhaus-display fw-black mb-4 border-bottom border-4 border-dark pb-3 d-inline-block">SMS SENT</h2>
            <p class="fs-5 fw-bold text-dark text-opacity-75 mb-5">
                WE'VE SENT A VERIFICATION LINK TO YOUR PHONE NUMBER. <br>
                PLEASE CHECK YOUR MESSAGES TO ACTIVATE YOUR ACCOUNT. THE LINK EXPIRES IN 15 MINUTES.
            </p>
            <div class="d-grid mt-4 mx-auto" style="max-width: 300px;">
                <a href="{% url 'Eduverse:login' %}" class="btn-bauhaus btn-bauhaus-blue px-4 py-3">BACK TO LOGIN</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

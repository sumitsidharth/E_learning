<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eduverse</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Eduverse</a>
            <div class="d-flex">
                {% if user.is_authenticated %}
                <form action="{% url 'Eduverse:logout' %}" method="post">
                    {% csrf_token %}
                    <button class="btn btn-light btn-sm" type="submit">Logout</button>
                </form>
                {% else %}
                <a class="btn btn-outline-light btn-sm me-2" href="{% url 'Eduverse:login' %}">Login</a>
                <a class="btn btn-light btn-sm" href="{% url 'Eduverse:register' %}">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
